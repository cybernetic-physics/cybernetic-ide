services:
  unitree-g1-sdk2-sidecar:
    build:
      context: .
    image: cyber/unitree-g1-sdk2-sidecar:0.1.0
    pull_policy: build
    container_name: unitree-g1-sdk2-sidecar
    network_mode: host
    environment:
      CYBER_UNITREE_MODE: ${CYBER_UNITREE_MODE:-sim}
      CYBER_UNITREE_TRANSPORT: ${CYBER_UNITREE_TRANSPORT:-dds}
      CYBER_UNITREE_DDS_DOMAIN: ${CYBER_UNITREE_DDS_DOMAIN:-1}
      CYBER_UNITREE_NETWORK_INTERFACE: ${CYBER_UNITREE_NETWORK_INTERFACE:-lo}
      UNITREE_SDK2_PYTHON_ROOT: /opt/unitree_sdk2_python
      UNITREE_SDK2_ROOT: /opt/unitree_sdk2
      UNITREE_MUJOCO_ROOT: /opt/unitree_mujoco
      UNITREE_SDK2_PYTHON_REVISION: ${UNITREE_SDK2_PYTHON_REVISION}
      UNITREE_SDK2_REVISION: ${UNITREE_SDK2_REVISION}
      UNITREE_MUJOCO_REVISION: ${UNITREE_MUJOCO_REVISION}
    volumes:
      - ${UNITREE_SDK2_PYTHON_HOST_ROOT}:/opt/unitree_sdk2_python:ro
      - ${UNITREE_SDK2_HOST_ROOT}:/opt/unitree_sdk2:ro
      - ${UNITREE_MUJOCO_HOST_ROOT}:/opt/unitree_mujoco:ro
