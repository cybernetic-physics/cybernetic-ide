[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cybernetic-robotics"
version = "0.1.0"
description = "Beginner-friendly Python controls for Cybernetic IDE's Unitree G1 MuJoCo simulator."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "GPL-3.0-or-later" }
authors = [{ name = "Cybernetic Physics" }]
keywords = ["robotics", "mujoco", "unitree", "g1", "cybernetic-ide"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Scientific/Engineering",
]
dependencies = []

[project.scripts]
cyber-g1 = "cybernetic_robotics.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.pytest.ini_options]
testpaths = ["tests"]
