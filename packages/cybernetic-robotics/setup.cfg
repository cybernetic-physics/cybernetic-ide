[metadata]
name = cybernetic-robotics
version = 0.1.0
description = Beginner-friendly Python controls for Cybernetic IDE's Unitree G1 MuJoCo simulator.
long_description = file: README.md
long_description_content_type = text/markdown
license = GPL-3.0-or-later
author = Cybernetic Physics
keywords = robotics, mujoco, unitree, g1, cybernetic-ide
classifiers =
    Development Status :: 3 - Alpha
    Intended Audience :: Developers
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3 :: Only
    Topic :: Scientific/Engineering

[options]
package_dir =
    = src
packages = find:
python_requires = >=3.9
include_package_data = true

[options.packages.find]
where = src

[options.entry_points]
console_scripts =
    cyber-g1 = cybernetic_robotics.cli:main
